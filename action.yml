
name: "ReleaseScribe – Conventional Commits → Changelog & Release"
description: "Generate CHANGELOG.md, bump SemVer, and create GitHub Releases from Conventional Commits. Includes presets & monorepo mode."
author: "Zero Nonsense Dev"
branding:
  icon: "book-open"
  color: "blue"
inputs:
  release-type:
    description: "auto|patch|minor|major"
    required: false
    default: "auto"
  changelog-path:
    description: "Path to CHANGELOG.md"
    required: false
    default: "CHANGELOG.md"
  prev-tag:
    description: "Override previous tag (optional)"
    required: false
  next-tag:
    description: "Override next tag (optional, e.g., v1.2.3)"
    required: false
  dry-run:
    description: 'If true, compute and log changes without modifying files or creating releases'
    required: false
    default: 'false'
  preset:
    description: "Conventional preset id (e.g., conventional)"
    required: false
    default: "conventional"
  preset-path:
    description: "Path to custom preset JSON"
    required: false
  monorepo:
    description: "Enable monorepo mode (true|false)"
    required: false
    default: "false"
  packages-glob:
    description: "Glob for packages (only used in monorepo mode)"
    required: false
    default: "packages/*"
  license-key:
    description: "Paid license key (or set RELEASESCRIBE_LICENSE_KEY secret)"
    required: false
  license-api-url:
    description: "License validation endpoint"
    required: false
    default: "https://api.releasescribe.dev/v1/licenses/validate"
  license-fail-open:
    description: "If true, continue when license validation cannot be completed"
    required: false
    default: "false"
  execution-mode:
    description: "local|remote (remote calls your core API for release planning)"
    required: false
    default: "local"
  core-api-url:
    description: "Remote core API endpoint used when execution-mode=remote"
    required: false
  core-api-token:
    description: "Token for remote core API (recommended via secrets)"
    required: false
  core-api-timeout-ms:
    description: "Timeout in milliseconds for remote core API requests"
    required: false
    default: "15000"
  github-token:
    description: "GitHub token (defaults to GITHUB_TOKEN)"
    required: false
outputs:
  next_version:
    description: "Calculated next version (e.g., v1.2.3)"
runs:
  using: "node20"
  main: "dist/index.js"
